<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valina Page SCSS</title>
    <link rel="stylesheet" href="../css/test01.css">

    <style>
    </style>
</head>
<body>
    <div class="container">
        <h1>Valina Page SCSS</h1>
        <p>This is a sample page demonstrating the use of SCSS in a vanilla HTML page.</p>
        <button class="btn">Click Me</button>

        <div class="task-detail-container">
            <h2>Task Details</h2>
            <p>This section contains details about the task.</p>

            <div class="row-1">
              <div class="row-1_left">
                <div class="col-1">
                    <p>Column 1</p>
                </div>
                <div class="col-2">
                    <p>Column 2</p>
                </div>
              </div>

              <div class="row-1_right">
                  <div>
                    <button class="btn">Button 1</button>
                  </div>
                  <div>
                    <button class="btn">Button 2</button>
                  </div>
              </div>
            </div>

        </div>


        <!-- Modal sample -->
         <!-- Trigger Button -->
        <a href="#my-modal" class="open-btn">Open Modal</a>

        <!-- Modal Backdrop and Window -->
        <div id="my-modal" class="modal-overlay">
            <div class="modal-box">
                <h2>Modal Header</h2>
                <p>This is a pure CSS modal box overlay!</p>
                <a href="#" class="close-btn">&times;</a>
            </div>
        </div>

    </div>
</body>
</html>
